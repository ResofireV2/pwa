      vapid_not_configured: "VAPID keys have not been generated yet. Push notifications will not work until keys are generated."
      vapid_generate: Generate VAPID keys
      vapid_regenerate: Regenerate VAPID keys
      vapid_generating: Generating…
      vapid_regenerate_warning: "Regenerating invalidates all existing subscriptions."
      vapid_regenerate_confirm: "Regenerate VAPID keys? All existing push subscriptions will be deleted and users will need to re-subscribe."
      vapid_generate_error: "Failed to generate VAPID keys. Check your server logs."

      prompt_heading: First-run prompt
      prompt_enabled_label: Show push notification prompt on first standalone launch
      prompt_enabled_help: "Displays a modal asking the user to enable notifications the first time they open the installed app. Never shown in the browser."
      prompt_title_label: Prompt title
      prompt_title_help: "Heading shown in the push permission modal."
      prompt_title_placeholder: Stay in the loop
      prompt_body_label: Prompt body
      prompt_body_help: "Description shown below the title."
      prompt_body_placeholder: "Get notified when someone replies or mentions you."
      prompt_delay_label: Delay before showing (milliseconds)
      prompt_delay_help: "How long after the app opens before the prompt appears."

