      pad_always_up_help: "Safari's share button is always in the top bar on iPad regardless of orientation."

      statusbar_heading: Status bar
      statusbar_label: Status bar style
      statusbar_help: "Controls the iOS status bar appearance when the app is running in standalone mode."
      statusbar_default: Default
      statusbar_black: Black
      statusbar_black_translucent: Black translucent

    push:
      vapid_heading: VAPID keys
      vapid_help: "VAPID keys authenticate your push notifications. Generate them once — regenerating invalidates all existing subscriptions."
