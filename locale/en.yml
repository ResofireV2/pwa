      https_ok_body: "Your forum is served over HTTPS. PWAs require a secure context."
      https_err: HTTPS not detected
      https_err_body: "Your forum base URL does not use HTTPS. PWAs require a secure context to be installable."
      name_ok: App name set
      name_ok_body: "Your app name is configured and will appear on install prompts and the splash screen."
      name_err: App name not set
      name_err_body: "Set an app name on the General tab. The forum title will be used as a fallback."
