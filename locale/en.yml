      badge_help: "Upload an image for the small badge icon shown on Android notifications. Use a transparent background and keep your logo within a circular safe zone — Android crops the badge to a circle and tints it to match the system color. Simple shapes work best. The server resizes it to 96×96px automatically."
      badge_upload: Upload badge image
      badge_replace: Replace badge image
      badge_uploading: Uploading…
      badge_delete: Delete badge
      badge_upload_error: Badge upload failed. Please try again.

